<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="css/theme/dark-theme.css">
    <link rel="stylesheet" href="css/nutrition/create-recipe.css">
</head>
<body>
    <header id="dateHeader"></header>
    <div class="blur-overlay" id="blurOverlay"></div>

    <div class="container">
        <div class="tab-container">
            <div class="tab-buttons">
                <button class="tab-btn active" onclick="switchTab('create')">Create New Recipe</button>
                <button class="tab-btn" onclick="switchTab('saved')">My Saved Recipes</button>
            </div>

            <div id="createTab" class="tab-content active">
                <div class="recipe-name-group">
                    <input type="text" id="recipeName" placeholder="Recipe name..." class="recipe-name-input">
                    <button class="btn" id="saveRecipeBtn" onclick="saveRecipe()" style="display:none">Save</button>
                    <button class="btn" id="cancelEditBtn" onclick="clearRecipeForm()" style="display:none">Cancel Edit</button>
                    <button class="btn" id="saveNewRecipeBtn" onclick="saveAsNew()">Save New</button>
                </div>

                <div class="input-group">
                    <input type="text" class="food" placeholder="Ingredient name...">
                    <input class="grams" type="number" inputmode="numeric" placeholder="Grams">
                    <button class="btn" id="addIngredient">Add</button>
                </div>

                <div id="autocompleteList"></div>

                <div id="ingredientsList" class="scrollable-list"></div>

                <div class="results-container">
                    <div id="recipeResults"></div>
                </div>
            </div>

            <div id="savedTab" class="tab-content">
                <div id="savedRecipesList" class="scrollable-list"></div>
            </div>
        </div>
    </div>

    <script src="js/core/storage.js"></script>
    <script src="js/food/database-utils.js"></script>
    <script src="js/food/food-autocomplete.js"></script>
    <script src="js/food/fdc-import.js"></script>
    <script src="js/core/menu.js"></script>
    <script src="js/nutrition/create-recipe.js"></script>
</body>
</html>
