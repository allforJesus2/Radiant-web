<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Meal Plan - Radiant</title>
    <link rel="stylesheet" href="css/theme/dark-theme.css">
    <link rel="stylesheet" href="css/nutrition/meal-plan.css">
</head>

<body>
    <header id="dateHeader"></header>
    <div class="blur-overlay" id="blurOverlay"></div>

    <div class="container">
        <div class="meal-plan-builder-container">
            <div class="meal-plan-name-section">
                <select id="mealPlanName" class="food">
                    <option value="">Create new meal plan...</option>
                </select>
                <input type="text" id="newMealPlanName" placeholder="New meal plan name..." class="food" style="display: none;">
                <button type="button" class="btn" id="deleteMealPlanBtn" onclick="deleteMealPlan()" style="display: none; background-color: #dc3545; color: white;">Delete</button>
                <div class="meal-plan-actions">
                    <button type="button" class="btn" id="saveMealPlanBtn" onclick="saveMealPlan()">Save</button>
                    <button type="button" class="btn" id="saveAsMealPlanBtn" onclick="saveMealPlanAsCopy()" style="display: none;">Save as new plan</button>
                    <button type="button" class="btn" onclick="window.location.href='meal-plan.html'">Cancel</button>
                </div>
            </div>

            <div class="add-meal-item-section">
                <div>
                    <input type="text" class="food" id="mealPlanFood" placeholder="Food name...">
                    <input class="grams" type="number" inputmode="numeric" id="mealPlanGrams" placeholder="Grams">
                    <button type="button" class="btn" id="addMealItem">Add</button>
                    <select id="mealCategory" class="btn">
                        <option value="breakfast">🌅 Breakfast</option>
                        <option value="lunch">☀️ Lunch</option>
                        <option value="dinner">🌙 Dinner</option>
                        <option value="snack">🍎 Snack</option>
                    </select>
                </div>
            </div>

            <div id="autocompleteList"></div>

            <div class="meal-categories">
                <div class="meal-category">
                    <h4 id="breakfastHeader">🌅 Breakfast</h4>
                    <div id="breakfastItems" class="meal-plan-items"></div>
                </div>
                <div class="meal-category">
                    <h4 id="lunchHeader">☀️ Lunch</h4>
                    <div id="lunchItems" class="meal-plan-items"></div>
                </div>
                <div class="meal-category">
                    <h4 id="dinnerHeader">🌙 Dinner</h4>
                    <div id="dinnerItems" class="meal-plan-items"></div>
                </div>
                <div class="meal-category">
                    <h4 id="snackHeader">🍎 Snack</h4>
                    <div id="snackItems" class="meal-plan-items"></div>
                </div>
            </div>

            <div class="daily-totals-section">
                <h4 id="dailyTotalsHeader">📊 Daily Total</h4>
            </div>
        </div>
    </div>

    <script src="js/core/storage.js"></script>
    <script src="js/food/database-utils.js"></script>
    <script src="js/food/food-autocomplete.js"></script>
    <script src="js/nutrition/meal-plan.js"></script>
    <script src="js/core/menu.js"></script>
    <script src="js/nutrition/create-meal-plan.js"></script>
</body>
</html>
