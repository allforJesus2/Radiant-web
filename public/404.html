<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Page Not Found</title>
    <link rel="stylesheet" href="css/theme/dark-theme.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 24px;
        }
        .not-found {
            max-width: 420px;
            text-align: center;
            padding: 32px 24px;
            border: 1px solid var(--input, #555);
            border-radius: 8px;
        }
        .not-found h1 { margin: 0 0 8px; font-size: 2rem; }
        .not-found p { opacity: 0.85; line-height: 1.5; }
        .not-found a {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 20px;
            background: var(--button, #333);
            color: var(--text, #fff);
            text-decoration: none;
            border-radius: 6px;
        }
    </style>
</head>
<body>
    <div class="not-found">
        <h1>404</h1>
        <p>The page you requested was not found.</p>
        <a href="index.html">Back to Radiant</a>
    </div>
</body>
</html>
