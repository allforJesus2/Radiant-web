<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Statistics</title>
    <link rel="stylesheet" href="dark-theme.css">
    <link rel="stylesheet" href="navigation.css">
    <script src="navigation.js"></script>
    <script src="menu.js"></script>
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .character-picker.character-picker--header {
            margin: 0 auto 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: min(840px, 94vw);
        }


        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--input, #555);
            border-radius: 4px;
            background-color: var(--background, #222);
            color: var(--text, #fff);
        }

        .unit-group {
            display: flex;
            gap: 10px;
        }

        .unit-group input {
            flex: 2;
        }

        .unit-group select {
            flex: 1;
        }

        .feet-inches-group {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 2;
        }

        .feet-inches-group input {
            flex: 1;
            min-width: 60px;
        }

        .metric-group {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 2;
        }

        .unit-label {
            color: var(--text, #fff);
            font-size: 0.9em;
            white-space: nowrap;
        }

        .input-tip {
            margin-top: 5px;
            font-size: 0.85em;
            color: #888;
            font-style: italic;
        }

        .settings-hint {
            text-align: center;
            margin: -8px 0 28px;
            font-size: 0.85em;
            color: #888;
            font-style: italic;
        }

        .settings-hint a {
            color: #9cc3ff;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: var(--button, #444);
            color: var(--text, #fff);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--button-hover, #555);
        }

        .character-picker.character-picker--header .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        button.character-preview {
            width: 156px;
            height: 156px;
            flex-shrink: 0;
            cursor: pointer;
            font: inherit;
            color: inherit;
            align-items: center;
            justify-content: center;
        }

        .character-preview {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            transition: border-color 0.15s, opacity 0.15s;
        }

        .character-preview:focus-visible {
            outline: 1px solid rgba(156, 195, 255, 0.6);
            outline-offset: 6px;
        }

        .character-preview:hover:not(:disabled) {
            border-color: rgba(255, 255, 255, 0.18);
        }

        .character-preview.is-empty {
            opacity: 0.72;
        }

        .character-preview.is-empty::after {
            content: '';
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        .character-options-panel {
            display: none;
            margin-top: 24px;
            width: 100%;
            max-width: min(780px, 94vw);
        }

        .character-options-panel.is-open {
            display: block;
        }

        .character-preview img {
            width: 100%;
            height: 100%;
            max-width: 100%;
            max-height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .character-preview.is-empty img {
            display: none;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding: 15px;
            margin: 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            background-color: rgba(0, 0, 0, 0.18);
            list-style: none;
            box-sizing: border-box;
        }

        .character-grid button {
            display: block;
            width: 100%;
            aspect-ratio: 1;
            padding: 0;
            margin: 0;
            border: 1px solid transparent;
            border-radius: 50%;
            background: var(--background, #1a1a1a);
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.15s, transform 0.1s;
        }

        .character-grid button:hover,
        .character-grid button:focus-visible {
            border-color: rgba(255, 255, 255, 0.28);
            outline: none;
        }

        .character-grid button.is-selected {
            border-color: rgba(255, 255, 255, 0.42);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
        }

        .character-grid button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            vertical-align: middle;
        }


    </style>
</head>
<body>
    <header id="dateHeader"></header>
    <div class="blur-overlay" id="blurOverlay"></div>
    <div class="profile-container">
        <div class="progress-indicator">
            <!-- Progress indicator will be rendered by navigation.js -->
        </div>
        <div class="character-picker character-picker--header">
            <span class="visually-hidden" id="characterPickerSrLabel">Profile picture</span>
            <input type="hidden" id="characterImageFilename" name="characterImage" value="">
            <button type="button" id="characterPreviewToggle" class="character-preview is-empty" aria-expanded="false" aria-controls="characterOptionsPanel" aria-labelledby="characterPickerSrLabel">
                <img id="characterPreviewImg" alt="">
            </button>
            <div id="characterOptionsPanel" class="character-options-panel">
                <ul id="characterImageGrid" class="character-grid" role="listbox" aria-label="Profile pictures"></ul>
            </div>
        </div>
        <p class="settings-hint">You can download a full backup of all your data (including food logs) in <a href="settings.html">Settings</a> — use "Download All Data".</p>
        <form id="profileForm">

            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required>
            </div>

            <div class="form-group">
                <label for="height">Height:</label>
                <div class="unit-group">
                    <div class="feet-inches-group" id="feetInchesGroup">
                        <input type="number" id="heightFeet" name="heightFeet" placeholder="Feet" min="0" max="10">
                        <span class="unit-label">ft</span>
                        <input type="number" id="heightInches" name="heightInches" placeholder="Inches" min="0" max="11">
                        <span class="unit-label">in</span>
                    </div>
                    <div class="metric-group" id="metricGroup" style="display: none;">
                        <input type="number" id="height" name="height" placeholder="Centimeters">
                        <span class="unit-label">cm</span>
                    </div>
                    <select id="heightUnit" name="heightUnit" onchange="toggleHeightInput()">
                        <option value="ft-in" selected>ft & in</option>
                        <option value="cm">cm</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="weight">Weight:</label>
                <div class="unit-group">
                    <input type="number" id="weight" name="weight" required>
                    <select id="weightUnit" name="weightUnit">
                        <option value="kg">kg</option>
                        <option value="lbs" selected>lbs</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="bodyFatPercent">Body Fat Percent:</label>
                <input type="number" id="bodyFatPercent" name="bodyFatPercent" required>
                <div class="input-tip">💡 Tip: Enter a whole number (e.g., 15 for 15%)</div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn">Save Profile</button>
                <button type="button" class="btn" onclick="downloadProfile()">Download Profile</button>
                <button type="button" class="btn" onclick="uploadProfile()">Upload Profile</button>
                <button type="button" class="btn" id="nextButton" onclick="validateAndNavigate()" style="background-color: #007BFF; color: #fff;">NEXT: Set BMR</button>
            </div>
        </form>
    </div>

    <script>
    const CHARACTER_FOLDER = 'assets/character images/';
    /** @type {string[]} */
    let characterManifestFiles = [];

    function characterImageUrl(filename) {
        return CHARACTER_FOLDER + encodeURIComponent(filename);
    }

    function effectiveCharacterFile() {
        const saved = document.getElementById('characterImageFilename').value.trim();
        if (saved) {
            return saved;
        }
        return characterManifestFiles[0] || '';
    }

    function characterSaveValue() {
        const saved = document.getElementById('characterImageFilename').value.trim();
        if (saved) {
            return saved;
        }
        return characterManifestFiles[0] || '';
    }

    function syncCharacterPreviewAndGrid() {
        const previewBtn = document.getElementById('characterPreviewToggle');
        const imgEl = document.getElementById('characterPreviewImg');
        const effective = effectiveCharacterFile();

        document.querySelectorAll('#characterImageGrid button.is-selected').forEach(function (b) {
            b.classList.remove('is-selected');
        });

        if (effective) {
            previewBtn.classList.remove('is-empty');
            imgEl.src = characterImageUrl(effective);
            imgEl.alt = 'Profile character';
            document.querySelectorAll('#characterImageGrid button[data-character-file]').forEach(function (btn) {
                if (btn.dataset.characterFile === effective) {
                    btn.classList.add('is-selected');
                }
            });
        } else {
            previewBtn.classList.add('is-empty');
            imgEl.removeAttribute('src');
            imgEl.alt = '';
        }
    }

    function setCharacterPickerOpen(open) {
        const panel = document.getElementById('characterOptionsPanel');
        const btn = document.getElementById('characterPreviewToggle');
        panel.classList.toggle('is-open', !!open);
        btn.setAttribute('aria-expanded', open ? 'true' : 'false');
        syncCharacterPreviewAndGrid();
    }

    function toggleCharacterPicker() {
        const panel = document.getElementById('characterOptionsPanel');
        setCharacterPickerOpen(!panel.classList.contains('is-open'));
    }

    function applyStoredCharacterPreference(stored) {
        document.getElementById('characterImageFilename').value = typeof stored === 'string' ? stored.trim() : '';
        syncCharacterPreviewAndGrid();
    }

    function persistCharacterImageToProfileStatistics() {
        const value = characterSaveValue();
        if (!value) {
            return;
        }
        const raw = localStorage.getItem('profileStatistics');
        let prev = {};
        if (raw) {
            try {
                prev = JSON.parse(raw);
                if (!prev || typeof prev !== 'object') {
                    return;
                }
            } catch (e) {
                return;
            }
        }
        prev.characterImage = value;
        localStorage.setItem('profileStatistics', JSON.stringify(prev));
    }

    function setCharacterSelection(filename) {
        document.getElementById('characterImageFilename').value =
            typeof filename === 'string' ? filename.trim() : '';
        syncCharacterPreviewAndGrid();
        setCharacterPickerOpen(false);
        persistCharacterImageToProfileStatistics();
    }

    async function loadCharacterImageGrid() {
        const grid = document.getElementById('characterImageGrid');
        grid.innerHTML = '';

        try {
            const response = await fetch('assets/character-images-manifest.json');
            if (!response.ok) {
                throw new Error('manifest not found');
            }
            const manifest = await response.json();
            characterManifestFiles = Array.isArray(manifest.files) ? manifest.files : [];

            characterManifestFiles.forEach(function (filename) {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.characterFile = filename;
                btn.setAttribute('aria-label', filename);
                btn.setAttribute('role', 'option');
                const thumb = document.createElement('img');
                thumb.alt = '';
                thumb.src = characterImageUrl(filename);
                thumb.loading = 'lazy';
                thumb.decoding = 'async';
                btn.appendChild(thumb);
                li.appendChild(btn);
                grid.appendChild(li);
            });

            grid.addEventListener('click', function (e) {
                const btn = e.target.closest('button[data-character-file]');
                if (!btn || !grid.contains(btn)) {
                    return;
                }
                setCharacterSelection(btn.dataset.characterFile);
            });
        } catch (err) {
            characterManifestFiles = [];
            console.warn('Character manifest failed to load:', err);
        }
    }

    function prepopulateForm() {
        const profileData = localStorage.getItem('profileStatistics');
        let characterImageStored = '';

        if (profileData) {
            const data = JSON.parse(profileData);
            characterImageStored = data.characterImage || '';

            document.getElementById('gender').value = data.gender;
            document.getElementById('age').value = data.age;

            let height = data.height;
            let heightUnit = data.heightUnit || 'cm';

            if (heightUnit === 'ft-in') {
                const totalInches = data.height / 2.54;
                const heightFeet = Math.floor(totalInches / 12);
                const heightInches = Math.round(totalInches % 12);
                document.getElementById('heightFeet').value = heightFeet;
                document.getElementById('heightInches').value = heightInches;
            } else if (heightUnit === 'in') {
                height = (data.height / 2.54).toFixed(2);
                heightUnit = 'cm';
                document.getElementById('height').value = height;
            } else {
                document.getElementById('height').value = height;
            }

            document.getElementById('heightUnit').value = heightUnit;
            toggleHeightInput();

            let weight = data.weight;
            let weightUnit = 'kg';
            if (data.weightUnit === 'lbs') {
                weight = (data.weight / 0.453592).toFixed(2);
                weightUnit = 'lbs';
            }
            document.getElementById('weight').value = weight;
            document.getElementById('weightUnit').value = weightUnit;

            document.getElementById('bodyFatPercent').value = data.bodyFatPercent;
        }

        applyStoredCharacterPreference(characterImageStored);
    }

    document.addEventListener('DOMContentLoaded', function () {
        setupHeader('Profile Statistics');
        const form = document.getElementById('profileForm');
        const previewToggle = document.getElementById('characterPreviewToggle');
        previewToggle.addEventListener('click', toggleCharacterPicker);

        document.addEventListener('click', function (event) {
            const panel = document.getElementById('characterOptionsPanel');
            const host = document.querySelector('.character-picker');
            if (!panel.classList.contains('is-open') || !host) {
                return;
            }
            if (!host.contains(event.target)) {
                setCharacterPickerOpen(false);
            }
        });

        loadCharacterImageGrid().then(function () {
            prepopulateForm();
        });

        form.addEventListener('submit', function (event) {
            event.preventDefault();
            saveProfileData();
        });
    });

    // Function to save profile data
    function saveProfileData() {
        // Convert height and weight if necessary
        let height;
        const heightUnit = document.getElementById('heightUnit').value;
        
        if (heightUnit === 'ft-in') {
            const heightFeet = parseFloat(document.getElementById('heightFeet').value) || 0;
            const heightInches = parseFloat(document.getElementById('heightInches').value) || 0;
            const totalInches = (heightFeet * 12) + heightInches;
            height = (totalInches * 2.54).toFixed(2); // Convert to centimeters
        } else {
            height = document.getElementById('height').value;
            if (heightUnit === 'cm') {
                height = parseFloat(height).toFixed(2);
            }
        }

        let weight = document.getElementById('weight').value;
        const weightUnit = document.getElementById('weightUnit').value;
        if (weightUnit === 'lbs') {
            weight = (weight * 0.453592).toFixed(2); // Convert pounds to kilograms
        }

        const profileData = {
            gender: document.getElementById('gender').value,
            age: document.getElementById('age').value,
            height: height,
            weight: weight,
            bodyFatPercent: document.getElementById('bodyFatPercent').value,
            heightUnit: heightUnit,
            weightUnit: weightUnit,
            characterImage: characterSaveValue()
        };

        // Retrieve the existing profileStatistics from localStorage
        let existingProfileData = localStorage.getItem('profileStatistics');
        if (existingProfileData) {
            existingProfileData = JSON.parse(existingProfileData);
            Object.assign(existingProfileData, profileData);
            localStorage.setItem('profileStatistics', JSON.stringify(existingProfileData));
        } else {
            localStorage.setItem('profileStatistics', JSON.stringify(profileData));
        }

        // Handle weight and body fat tracking
        let weightAndBodyFatData = localStorage.getItem('weightAndBodyFatData');
        if (!weightAndBodyFatData) {
            weightAndBodyFatData = {};
        } else {
            weightAndBodyFatData = JSON.parse(weightAndBodyFatData);
        }

        const currentDate = new Date();
        const formattedDate = currentDate.toISOString().split('T')[0];

        weightAndBodyFatData[formattedDate] = {
            weight: weight,
            bodyFatPercent: document.getElementById('bodyFatPercent').value
        };

        localStorage.setItem('weightAndBodyFatData', JSON.stringify(weightAndBodyFatData));
    }

    // Function to toggle height input between feet/inches and centimeters
    function toggleHeightInput() {
        const heightUnit = document.getElementById('heightUnit').value;
        const feetInchesGroup = document.getElementById('feetInchesGroup');
        const metricGroup = document.getElementById('metricGroup');
        
        if (heightUnit === 'ft-in') {
            feetInchesGroup.style.display = 'flex';
            metricGroup.style.display = 'none';
        } else {
            feetInchesGroup.style.display = 'none';
            metricGroup.style.display = 'flex';
        }
    }

    // Function to validate form and navigate
    function validateAndNavigate() {
        const gender = document.getElementById('gender').value;
        const age = document.getElementById('age').value;
        const heightUnit = document.getElementById('heightUnit').value;
        const weight = document.getElementById('weight').value;
        const bodyFatPercent = document.getElementById('bodyFatPercent').value;

        // Check height based on unit
        let heightValid = false;
        if (heightUnit === 'ft-in') {
            const heightFeet = document.getElementById('heightFeet').value;
            const heightInches = document.getElementById('heightInches').value;
            heightValid = heightFeet && heightInches;
        } else {
            const height = document.getElementById('height').value;
            heightValid = height;
        }

        if (!gender || !age || !heightValid || !weight || !bodyFatPercent) {
            alert('Please fill in all required fields before proceeding.');
            return;
        }

        // Save data before navigating
        saveProfileData();
        window.location.href = 'calculate_bmr.html';
    }

    // Function to download profile
    function downloadProfile() {
        const profileData = localStorage.getItem('profileStatistics');
        if (profileData) {
            const blob = new Blob([profileData], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'profile-data.json';
            a.click();
            URL.revokeObjectURL(url);
        } else {
            alert('No profile data to download.');
        }
    }

    // Function to upload profile
    function uploadProfile() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = '.json';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    try {
                        const data = JSON.parse(e.target.result);
                        localStorage.setItem('profileStatistics', JSON.stringify(data));
                        prepopulateForm();
                        alert('Profile uploaded successfully!');
                    } catch (error) {
                        alert('Invalid file format.');
                    }
                };
                reader.readAsText(file);
            }
        };
        input.click();
    }




    </script>

</body>
</html>
