<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Statistics</title>
    <link rel="stylesheet" href="dark-theme.css">
    <link rel="stylesheet" href="navigation.css">
    <script src="navigation.js"></script>
    <script src="menu.js"></script>
    <style>
        .profile-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .character-picker.character-picker--header {
            margin: 0 auto 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: min(840px, 94vw);
        }


        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        select, input {
            width: 100%;
            padding: 8px;
            border: 1px solid var(--input, #555);
            border-radius: 4px;
            background-color: var(--background, #222);
            color: var(--text, #fff);
        }

        .unit-group {
            display: flex;
            gap: 10px;
        }

        .unit-group input {
            flex: 2;
        }

        .unit-group select {
            flex: 1;
        }

        .feet-inches-group {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 2;
        }

        .feet-inches-group input {
            flex: 1;
            min-width: 60px;
        }

        .metric-group {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 2;
        }

        .unit-label {
            color: var(--text, #fff);
            font-size: 0.9em;
            white-space: nowrap;
        }

        .input-tip {
            margin-top: 5px;
            font-size: 0.85em;
            color: #888;
            font-style: italic;
        }

        .settings-hint {
            text-align: center;
            margin: -8px 0 28px;
            font-size: 0.85em;
            color: #888;
            font-style: italic;
        }

        .settings-hint a {
            color: #9cc3ff;
        }

        .button-group {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 30px;
        }

        .btn {
            padding: 10px;
            border: none;
            border-radius: 4px;
            background-color: var(--button, #444);
            color: var(--text, #fff);
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn:hover {
            background-color: var(--button-hover, #555);
        }

        .character-picker.character-picker--header .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        button.character-preview {
            width: 156px;
            height: 156px;
            flex-shrink: 0;
            cursor: pointer;
            font: inherit;
            color: inherit;
            align-items: center;
            justify-content: center;
        }

        .character-preview {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 0;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            box-sizing: border-box;
            transition: border-color 0.15s, opacity 0.15s;
        }

        .character-preview:focus-visible {
            outline: 1px solid rgba(156, 195, 255, 0.6);
            outline-offset: 6px;
        }

        .character-preview:hover:not(:disabled) {
            border-color: rgba(255, 255, 255, 0.18);
        }

        .character-preview.is-empty {
            opacity: 0.72;
        }

        .character-preview.is-empty::after {
            content: '';
            width: 66px;
            height: 66px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.08);
            pointer-events: none;
        }

        .character-options-panel {
            display: none;
            margin-top: 24px;
            width: 100%;
            max-width: min(780px, 94vw);
        }

        .character-options-panel.is-open {
            display: block;
        }

        .character-preview-viewport {
            position: relative;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            overflow: hidden;
            touch-action: none;
            cursor: grab;
        }

        .character-preview-viewport.is-dragging {
            cursor: grabbing;
        }

        .character-preview-viewport img {
            position: absolute;
            left: 50%;
            top: 50%;
            width: auto;
            height: auto;
            max-width: 100%;
            max-height: 100%;
            display: block;
            transform: translate(-50%, -50%) translate(var(--char-pan-x, 0px), var(--char-pan-y, 0px)) scale(var(--char-scale, 1));
            transform-origin: center center;
            will-change: transform;
            pointer-events: none;
            user-select: none;
            -webkit-user-drag: none;
        }

        .character-preview.is-empty .character-preview-viewport {
            display: none;
        }

        .character-preview-hint {
            margin: 8px 0 0;
            font-size: 0.8em;
            color: #888;
            text-align: center;
            max-width: 280px;
        }

        .character-preview-hint.is-hidden {
            display: none;
        }

        .character-change-btn {
            margin-top: 6px;
            padding: 4px 10px;
            font-size: 0.85em;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: #9cc3ff;
            cursor: pointer;
            text-decoration: underline;
        }

        .character-change-btn:hover {
            color: #b8d4ff;
        }

        .character-change-btn.is-hidden {
            display: none;
        }

        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(132px, 1fr));
            gap: 15px;
            max-height: 600px;
            overflow-y: auto;
            padding: 15px;
            margin: 0;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 6px;
            background-color: rgba(0, 0, 0, 0.18);
            list-style: none;
            box-sizing: border-box;
        }

        .character-grid button {
            display: block;
            width: 100%;
            aspect-ratio: 1;
            padding: 0;
            margin: 0;
            border: 1px solid transparent;
            border-radius: 50%;
            background: var(--background, #1a1a1a);
            cursor: pointer;
            overflow: hidden;
            transition: border-color 0.15s, transform 0.1s;
        }

        .character-grid button:hover,
        .character-grid button:focus-visible {
            border-color: rgba(255, 255, 255, 0.28);
            outline: none;
        }

        .character-grid button.is-selected {
            border-color: rgba(255, 255, 255, 0.42);
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12);
        }

        .character-grid button img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            vertical-align: middle;
        }


    </style>
</head>
<body>
    <header id="dateHeader"></header>
    <div class="blur-overlay" id="blurOverlay"></div>
    <div class="profile-container">
        <div class="progress-indicator">
            <!-- Progress indicator will be rendered by navigation.js -->
        </div>
        <div class="character-picker character-picker--header">
            <span class="visually-hidden" id="characterPickerSrLabel">Profile picture</span>
            <input type="hidden" id="characterImageFilename" name="characterImage" value="">
            <button type="button" id="characterPreviewToggle" class="character-preview is-empty" aria-expanded="false" aria-controls="characterOptionsPanel" aria-labelledby="characterPickerSrLabel">
                <span class="character-preview-viewport" id="characterPreviewViewport" aria-hidden="true">
                    <img id="characterPreviewImg" alt="" draggable="false">
                </span>
            </button>
            <p class="character-preview-hint is-hidden" id="characterPreviewHint">Drag to reposition · scroll or pinch to zoom · double-click to reset</p>
            <button type="button" class="character-change-btn is-hidden" id="characterChangeBtn">Change picture</button>
            <input type="file" id="characterImageUpload" class="visually-hidden" accept="image/*">
            <button type="button" class="character-change-btn" id="characterUploadBtn">Upload photo</button>
            <div id="characterOptionsPanel" class="character-options-panel">
                <ul id="characterImageGrid" class="character-grid" role="listbox" aria-label="Profile pictures"></ul>
            </div>
        </div>
        <p class="settings-hint">You can download a full backup of all your data (including food logs) in <a href="settings.html">Settings</a> — use "Download All Data".</p>
        <form id="profileForm">

            <div class="form-group">
                <label for="gender">Gender:</label>
                <select id="gender" name="gender" required>
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                </select>
            </div>

            <div class="form-group">
                <label for="age">Age:</label>
                <input type="number" id="age" name="age" required>
            </div>

            <div class="form-group">
                <label for="height">Height:</label>
                <div class="unit-group">
                    <div class="feet-inches-group" id="feetInchesGroup">
                        <input type="number" id="heightFeet" name="heightFeet" placeholder="Feet" min="0" max="10">
                        <span class="unit-label">ft</span>
                        <input type="number" id="heightInches" name="heightInches" placeholder="Inches" min="0" max="11">
                        <span class="unit-label">in</span>
                    </div>
                    <div class="metric-group" id="metricGroup" style="display: none;">
                        <input type="number" id="height" name="height" placeholder="Centimeters">
                        <span class="unit-label">cm</span>
                    </div>
                    <select id="heightUnit" name="heightUnit" onchange="toggleHeightInput()">
                        <option value="ft-in" selected>ft & in</option>
                        <option value="cm">cm</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="weight">Weight:</label>
                <div class="unit-group">
                    <input type="number" id="weight" name="weight" required>
                    <select id="weightUnit" name="weightUnit">
                        <option value="kg">kg</option>
                        <option value="lbs" selected>lbs</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="bodyFatPercent">Body Fat Percent:</label>
                <input type="number" id="bodyFatPercent" name="bodyFatPercent" required>
                <div class="input-tip">💡 Tip: Enter a whole number (e.g., 15 for 15%)</div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn">Save Profile</button>
                <button type="button" class="btn" onclick="downloadProfile()">Download Profile</button>
                <button type="button" class="btn" onclick="uploadProfile()">Upload Profile</button>
                <button type="button" class="btn" id="nextButton" onclick="validateAndNavigate()" style="background-color: #007BFF; color: #fff;">NEXT: Set BMR</button>
            </div>
        </form>
    </div>

    <script>
    const CHARACTER_FOLDER = 'assets/character images/';
    const CUSTOM_CHARACTER_KEY = '__custom__';
    const MIN_SCALE = 1, MAX_SCALE = 4;
    let characterManifestFiles = [];
    let characterImageViews = {};
    let customCharacterDataUrl = '';
    let didDrag = false;

    const el = id => document.getElementById(id);
    function charUrl(f) {
        if (f === CUSTOM_CHARACTER_KEY) return customCharacterDataUrl || '';
        return CHARACTER_FOLDER + encodeURIComponent(f);
    }
    function currentChar() {
        const v = el('characterImageFilename').value.trim();
        if (v === CUSTOM_CHARACTER_KEY && customCharacterDataUrl) return CUSTOM_CHARACTER_KEY;
        return v || characterManifestFiles[0] || '';
    }
    function clamp(s) { return Math.min(MAX_SCALE, Math.max(MIN_SCALE, s)); }

    function getView(file) {
        const v = characterImageViews[file] || {};
        return { scale: clamp(+v.scale || 1), x: +v.x || 0, y: +v.y || 0 };
    }

    function applyView(file) {
        const vp = el('characterPreviewViewport');
        if (!vp || !file) return;
        const v = getView(file);
        vp.style.setProperty('--char-scale', v.scale);
        vp.style.setProperty('--char-pan-x', v.x + 'px');
        vp.style.setProperty('--char-pan-y', v.y + 'px');
    }

    function saveView(file, v) {
        if (!file) return;
        characterImageViews[file] = { scale: clamp(v.scale), x: v.x, y: v.y };
        applyView(file);
        persistCharacterImage();
    }

    function syncPreview() {
        const file = currentChar(), has = !!file;
        el('characterPreviewToggle').classList.toggle('is-empty', !has);
        el('characterPreviewHint')?.classList.toggle('is-hidden', !has);
        el('characterChangeBtn')?.classList.toggle('is-hidden', !has);
        document.querySelectorAll('#characterImageGrid button.is-selected').forEach(b => b.classList.remove('is-selected'));
        if (has) {
            el('characterPreviewImg').src = charUrl(file);
            el('characterPreviewImg').alt = 'Profile character';
            applyView(file);
            document.querySelector(`#characterImageGrid button[data-character-file="${CSS.escape(file)}"]`)?.classList.add('is-selected');
        } else {
            el('characterPreviewImg').removeAttribute('src');
            el('characterPreviewImg').alt = '';
        }
    }

    function initZoomPan() {
        const vp = el('characterPreviewViewport'), btn = el('characterPreviewToggle');
        if (!vp || !btn) return;
        let ptrs = new Map(), dragStart = null, pinchStart = null;

        btn.addEventListener('click', e => {
            if (didDrag) { e.preventDefault(); e.stopPropagation(); didDrag = false; return; }
            if (btn.classList.contains('is-empty')) toggleCharacterPicker();
        });
        btn.addEventListener('dblclick', e => {
            if (!btn.classList.contains('is-empty')) { e.preventDefault(); saveView(currentChar(), { scale: 1, x: 0, y: 0 }); }
        });
        vp.addEventListener('wheel', e => {
            e.preventDefault();
            const f = currentChar(), v = getView(f);
            saveView(f, { ...v, scale: clamp(v.scale + (e.deltaY > 0 ? -0.08 : 0.08)) });
        }, { passive: false });
        vp.addEventListener('pointerdown', e => {
            if (btn.classList.contains('is-empty')) return;
            vp.setPointerCapture(e.pointerId);
            ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
            if (ptrs.size === 1) {
                dragStart = { x: e.clientX, y: e.clientY, view: getView(currentChar()) };
                didDrag = false;
            } else if (ptrs.size === 2) {
                const [a, b] = Array.from(ptrs.values());
                pinchStart = { dist: Math.hypot(a.x - b.x, a.y - b.y), view: getView(currentChar()) };
                dragStart = null;
            }
        });
        vp.addEventListener('pointermove', e => {
            if (!ptrs.has(e.pointerId)) return;
            ptrs.set(e.pointerId, { x: e.clientX, y: e.clientY });
            const f = currentChar();
            if (ptrs.size >= 2 && pinchStart) {
                const [a, b] = Array.from(ptrs.values());
                saveView(f, { ...pinchStart.view, scale: clamp(pinchStart.view.scale * Math.hypot(a.x - b.x, a.y - b.y) / pinchStart.dist) });
                didDrag = true; vp.classList.add('is-dragging'); return;
            }
            if (ptrs.size === 1 && dragStart) {
                const dx = e.clientX - dragStart.x, dy = e.clientY - dragStart.y;
                if (Math.abs(dx) > 3 || Math.abs(dy) > 3) { didDrag = true; vp.classList.add('is-dragging'); }
                saveView(f, { scale: dragStart.view.scale, x: dragStart.view.x + dx, y: dragStart.view.y + dy });
            }
        });
        function endPtr(e) {
            ptrs.delete(e.pointerId);
            if (ptrs.size < 2) pinchStart = null;
            if (ptrs.size === 0) {
                dragStart = null; vp.classList.remove('is-dragging');
                try { vp.releasePointerCapture(e.pointerId); } catch (_) {}
            } else if (ptrs.size === 1) {
                const pos = Array.from(ptrs.values())[0];
                dragStart = { x: pos.x, y: pos.y, view: getView(currentChar()) };
            }
        }
        vp.addEventListener('pointerup', endPtr);
        vp.addEventListener('pointercancel', endPtr);
    }

    function setCharacterPickerOpen(open) {
        el('characterOptionsPanel').classList.toggle('is-open', !!open);
        el('characterPreviewToggle').setAttribute('aria-expanded', open ? 'true' : 'false');
        syncPreview();
    }

    function toggleCharacterPicker() {
        setCharacterPickerOpen(!el('characterOptionsPanel').classList.contains('is-open'));
    }

    function persistCharacterImage() {
        const file = currentChar();
        if (!file) return;
        let prev = {};
        try { prev = JSON.parse(localStorage.getItem('profileStatistics')) || {}; } catch (_) {}
        if (typeof prev !== 'object') prev = {};
        prev.characterImage = file;
        prev.characterImageViews = characterImageViews;
        if (file === CUSTOM_CHARACTER_KEY) prev.characterImageCustom = customCharacterDataUrl;
        else delete prev.characterImageCustom;
        localStorage.setItem('profileStatistics', JSON.stringify(prev));
    }

    function setCharacterSelection(filename) {
        el('characterImageFilename').value = String(filename || '').trim();
        customCharacterDataUrl = '';
        syncPreview();
        setCharacterPickerOpen(false);
        persistCharacterImage();
    }

    function setCustomCharacterImage(dataUrl) {
        el('characterImageFilename').value = CUSTOM_CHARACTER_KEY;
        customCharacterDataUrl = dataUrl;
        syncPreview();
        setCharacterPickerOpen(false);
        persistCharacterImage();
    }

    function processImageFile(file) {
        if (!file || !file.type.startsWith('image/')) return;
        const reader = new FileReader();
        reader.onload = () => {
            const img = new Image();
            img.onload = () => {
                const max = 512;
                let { width, height } = img;
                if (width > max || height > max) {
                    const ratio = Math.min(max / width, max / height);
                    width = Math.round(width * ratio);
                    height = Math.round(height * ratio);
                }
                const canvas = document.createElement('canvas');
                canvas.width = width;
                canvas.height = height;
                canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                setCustomCharacterImage(canvas.toDataURL('image/jpeg', 0.85));
            };
            img.onerror = () => alert('Could not load that image.');
            img.src = reader.result;
        };
        reader.onerror = () => alert('Could not read that file.');
        reader.readAsDataURL(file);
    }

    function openCharacterImageUpload() {
        const input = el('characterImageUpload');
        if (!input) return;
        input.value = '';
        input.click();
    }

    async function loadCharacterImageGrid() {
        const grid = el('characterImageGrid');
        grid.innerHTML = '';
        try {
            const manifest = await fetch('assets/character-images-manifest.json').then(r => { if (!r.ok) throw new Error(); return r.json(); });
            characterManifestFiles = Array.isArray(manifest.files) ? manifest.files : [];
            characterManifestFiles.forEach(filename => {
                const li = document.createElement('li');
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.dataset.characterFile = filename;
                btn.setAttribute('aria-label', filename);
                btn.setAttribute('role', 'option');
                const thumb = document.createElement('img');
                thumb.alt = ''; thumb.src = charUrl(filename);
                thumb.loading = 'lazy'; thumb.decoding = 'async';
                btn.appendChild(thumb); li.appendChild(btn); grid.appendChild(li);
            });
            grid.addEventListener('click', e => {
                const btn = e.target.closest('button[data-character-file]');
                if (btn && grid.contains(btn)) setCharacterSelection(btn.dataset.characterFile);
            });
        } catch (err) {
            characterManifestFiles = [];
            console.warn('Character manifest failed to load:', err);
        }
    }

    function prepopulateForm() {
        let data = {};
        try { data = JSON.parse(localStorage.getItem('profileStatistics')) || {}; } catch (_) {}
        if (data.characterImageViews && typeof data.characterImageViews === 'object') {
            characterImageViews = data.characterImageViews;
        }
        customCharacterDataUrl = typeof data.characterImageCustom === 'string' ? data.characterImageCustom : '';
        if (data.gender) {
            el('gender').value = data.gender;
            el('age').value = data.age;
            let heightUnit = data.heightUnit || 'cm';
            if (heightUnit === 'ft-in') {
                const totalInches = data.height / 2.54;
                el('heightFeet').value = Math.floor(totalInches / 12);
                el('heightInches').value = Math.round(totalInches % 12);
            } else {
                el('height').value = heightUnit === 'in' ? (data.height / 2.54).toFixed(2) : data.height;
                if (heightUnit === 'in') heightUnit = 'cm';
            }
            el('heightUnit').value = heightUnit;
            toggleHeightInput();
            const isLbs = data.weightUnit === 'lbs';
            el('weight').value = isLbs ? (data.weight / 0.453592).toFixed(2) : data.weight;
            el('weightUnit').value = isLbs ? 'lbs' : 'kg';
            el('bodyFatPercent').value = data.bodyFatPercent;
        }
        el('characterImageFilename').value = (data.characterImage || '').trim();
        syncPreview();
    }

    document.addEventListener('DOMContentLoaded', () => {
        setupHeader('Profile Statistics');
        initZoomPan();
        el('characterChangeBtn')?.addEventListener('click', toggleCharacterPicker);
        el('characterUploadBtn')?.addEventListener('click', openCharacterImageUpload);
        el('characterImageUpload')?.addEventListener('change', e => {
            processImageFile(e.target.files?.[0]);
        });
        document.addEventListener('click', e => {
            const panel = el('characterOptionsPanel'), host = document.querySelector('.character-picker');
            if (panel.classList.contains('is-open') && host && !host.contains(e.target)) setCharacterPickerOpen(false);
        });
        loadCharacterImageGrid().then(prepopulateForm);
        el('profileForm').addEventListener('submit', e => { e.preventDefault(); saveProfileData(); });
    });

    function saveProfileData() {
        const heightUnit = el('heightUnit').value;
        const height = heightUnit === 'ft-in'
            ? (((parseFloat(el('heightFeet').value) || 0) * 12 + (parseFloat(el('heightInches').value) || 0)) * 2.54).toFixed(2)
            : parseFloat(el('height').value).toFixed(2);
        const weightUnit = el('weightUnit').value;
        const weight = weightUnit === 'lbs' ? (el('weight').value * 0.453592).toFixed(2) : el('weight').value;
        const profileData = {
            gender: el('gender').value, age: el('age').value,
            height, weight, bodyFatPercent: el('bodyFatPercent').value,
            heightUnit, weightUnit, characterImage: currentChar(), characterImageViews,
            ...(currentChar() === CUSTOM_CHARACTER_KEY ? { characterImageCustom: customCharacterDataUrl } : {})
        };
        if (profileData.characterImage !== CUSTOM_CHARACTER_KEY) delete profileData.characterImageCustom;
        let existing = {};
        try { existing = JSON.parse(localStorage.getItem('profileStatistics')) || {}; } catch (_) {}
        const merged = Object.assign(existing, profileData);
        if (merged.characterImage !== CUSTOM_CHARACTER_KEY) delete merged.characterImageCustom;
        localStorage.setItem('profileStatistics', JSON.stringify(merged));
        let wbf = {};
        try { wbf = JSON.parse(localStorage.getItem('weightAndBodyFatData')) || {}; } catch (_) {}
        wbf[new Date().toISOString().split('T')[0]] = { weight, bodyFatPercent: el('bodyFatPercent').value };
        localStorage.setItem('weightAndBodyFatData', JSON.stringify(wbf));
    }

    function toggleHeightInput() {
        const isFt = el('heightUnit').value === 'ft-in';
        el('feetInchesGroup').style.display = isFt ? 'flex' : 'none';
        el('metricGroup').style.display = isFt ? 'none' : 'flex';
    }

    function validateAndNavigate() {
        const heightUnit = el('heightUnit').value;
        const heightValid = heightUnit === 'ft-in' ? el('heightFeet').value && el('heightInches').value : el('height').value;
        if (!el('gender').value || !el('age').value || !heightValid || !el('weight').value || !el('bodyFatPercent').value) {
            alert('Please fill in all required fields before proceeding.');
            return;
        }
        saveProfileData();
        window.location.href = 'calculate_bmr.html';
    }

    function downloadProfile() {
        const data = localStorage.getItem('profileStatistics');
        if (!data) { alert('No profile data to download.'); return; }
        const a = Object.assign(document.createElement('a'), {
            href: URL.createObjectURL(new Blob([data], { type: 'application/json' })),
            download: 'profile-data.json'
        });
        a.click(); URL.revokeObjectURL(a.href);
    }

    function uploadProfile() {
        const input = Object.assign(document.createElement('input'), { type: 'file', accept: '.json' });
        input.onchange = e => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                try {
                    localStorage.setItem('profileStatistics', JSON.stringify(JSON.parse(ev.target.result)));
                    prepopulateForm();
                    alert('Profile uploaded successfully!');
                } catch (_) { alert('Invalid file format.'); }
            };
            reader.readAsText(file);
        };
        input.click();
    }
    </script>
